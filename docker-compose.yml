services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: french_succo
      POSTGRES_USER: succo
      POSTGRES_PASSWORD: succo_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U succo -d french_succo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - succo-net

  backend:
    build:
      context: ./backend/FrenchSucco.Api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      POSTGRES_CONNECTION: Host=postgres;Port=5432;Database=french_succo;Username=succo;Password=succo_secret
      MiniMax__ApiKey: ${MINIMAX_API_KEY:-}
      MiniMax__BaseUrl: ${MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      MiniMax__TextModel: ${MINIMAX_MODEL:-MiniMax-Text-01}
      MiniMax__Voice: ${MINIMAX_VOICE:-audio_default}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - succo-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - succo-net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - succo-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

networks:
  succo-net:
    driver: bridge
