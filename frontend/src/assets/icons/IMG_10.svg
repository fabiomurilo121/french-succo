<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="book-cover" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="page" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fffbeb"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="cup" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="coffee" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#92400e"/>
      <stop offset="1" stop-color="#451a03"/>
    </linearGradient>
  </defs>

  <!-- Background sky -->
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- soft clouds -->
  <ellipse cx="100" cy="60" rx="50" ry="10" fill="#fff" opacity="0.6"/>
  <ellipse cx="480" cy="80" rx="60" ry="8" fill="#fff" opacity="0.5"/>
  <ellipse cx="320" cy="40" rx="40" ry="6" fill="#fff" opacity="0.4"/>

  <!-- sun -->
  <circle cx="500" cy="90" r="34" fill="#fde68a"/>
  <circle cx="500" cy="90" r="22" fill="#fef3c7"/>

  <!-- Eiffel Tower silhouette (background) -->
  <g opacity="0.35">
    <rect x="380" y="140" width="40" height="180" fill="url(#tower)"/>
    <polygon points="400,80 392,140 408,140" fill="url(#tower)"/>
    <rect x="384" y="160" width="32" height="3" fill="#334155"/>
    <rect x="386" y="200" width="28" height="3" fill="#334155"/>
    <rect x="388" y="240" width="24" height="3" fill="#334155"/>
    <path d="M380 320 L362 360 L438 360 L420 320 Z" fill="url(#tower)"/>
  </g>

  <!-- Table surface -->
  <rect x="0" y="320" width="600" height="80" fill="#a16207"/>
  <rect x="0" y="318" width="600" height="6" fill="#78350f"/>
  <rect x="0" y="324" width="600" height="2" fill="#451a03" opacity="0.4"/>

  <!-- ===== Open book (centerpiece) ===== -->
  <g transform="translate(160 180)">
    <!-- shadow -->
    <ellipse cx="140" cy="160" rx="170" ry="10" fill="#000" opacity="0.18"/>

    <!-- back cover -->
    <path d="M-5 10 L285 10 L280 160 L0 160 Z" fill="url(#book-cover)"/>
    <path d="M-5 10 L285 10 L280 20 L0 20 Z" fill="#1e3a8a"/>
    <path d="M-5 10 L0 20 L0 160 L-5 160 Z" fill="#1e3a8a"/>
    <path d="M280 20 L285 10 L285 160 L280 160 Z" fill="#1e3a8a"/>

    <!-- pages (left) -->
    <path d="M5 25 L138 30 L138 152 L8 152 Z" fill="url(#page)"/>
    <path d="M5 25 L138 30 L138 38 L8 33 Z" fill="#fde68a"/>
    <!-- left page text lines -->
    <g stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round">
      <line x1="18" y1="52" x2="128" y2="54"/>
      <line x1="18" y1="64" x2="118" y2="66"/>
      <line x1="18" y1="76" x2="128" y2="78"/>
      <line x1="18" y1="88" x2="108" y2="90"/>
      <line x1="18" y1="100" x2="128" y2="102"/>
      <line x1="18" y1="112" x2="100" y2="114"/>
      <line x1="18" y1="124" x2="128" y2="126"/>
      <line x1="18" y1="136" x2="90" y2="138"/>
    </g>

    <!-- center binding -->
    <path d="M138 30 L142 30 L142 152 L138 152 Z" fill="#92400e"/>

    <!-- pages (right) -->
    <path d="M142 30 L275 25 L272 152 L142 152 Z" fill="url(#page)"/>
    <path d="M142 30 L275 25 L272 33 L142 38 Z" fill="#fde68a"/>
    <!-- right page text lines -->
    <g stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round">
      <line x1="152" y1="54" x2="262" y2="52"/>
      <line x1="152" y1="66" x2="252" y2="64"/>
      <line x1="152" y1="78" x2="262" y2="76"/>
      <line x1="152" y1="90" x2="242" y2="88"/>
      <line x1="152" y1="102" x2="262" y2="100"/>
      <line x1="152" y1="114" x2="232" y2="112"/>
      <line x1="152" y1="126" x2="262" y2="124"/>
      <line x1="152" y1="138" x2="220" y2="136"/>
    </g>
    <!-- title on right page -->
    <text x="207" y="20" font-family="serif" font-size="13" font-weight="700" fill="#1e3a8a" text-anchor="middle">Le Français</text>
  </g>

  <!-- Coffee cup (top right of book) -->
  <g transform="translate(440 250)">
    <!-- saucer -->
    <ellipse cx="40" cy="78" rx="50" ry="6" fill="#94a3b8"/>
    <ellipse cx="40" cy="78" rx="46" ry="4" fill="#cbd5e1"/>
    <!-- cup body -->
    <path d="M5 30 L75 30 L70 75 L10 75 Z" fill="url(#cup)"/>
    <path d="M5 30 L75 30 L72 38 L8 38 Z" fill="#f8fafc"/>
    <!-- handle -->
    <path d="M75 38 Q92 42 92 56 Q92 70 75 70" stroke="#cbd5e1" stroke-width="5" fill="none"/>
    <!-- coffee -->
    <ellipse cx="40" cy="32" rx="32" ry="5" fill="url(#coffee)"/>
    <!-- steam -->
    <path d="M25 18 Q22 10 28 4 Q34 -2 30 -10" stroke="#cbd5e1" stroke-width="2.5" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M45 16 Q42 8 48 2 Q54 -4 50 -12" stroke="#cbd5e1" stroke-width="2.5" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M60 20 Q57 12 63 6 Q69 0 65 -8" stroke="#cbd5e1" stroke-width="2.5" fill="none" opacity="0.7" stroke-linecap="round"/>
  </g>

  <!-- Croissant (left of book) -->
  <g transform="translate(60 290)">
    <path d="M0 30 Q20 0 50 8 Q70 14 80 30 Q70 36 50 32 Q20 28 0 30 Z" fill="#f59e0b"/>
    <path d="M5 28 Q22 6 48 12 Q66 18 74 30" stroke="#92400e" stroke-width="1.5" fill="none"/>
    <path d="M14 22 L18 14" stroke="#92400e" stroke-width="1.2" fill="none"/>
    <path d="M28 18 L30 10" stroke="#92400e" stroke-width="1.2" fill="none"/>
    <path d="M42 18 L42 10" stroke="#92400e" stroke-width="1.2" fill="none"/>
    <path d="M56 22 L58 14" stroke="#92400e" stroke-width="1.2" fill="none"/>
    <path d="M68 26 L72 18" stroke="#92400e" stroke-width="1.2" fill="none"/>
    <!-- highlight -->
    <path d="M10 24 Q24 10 48 16" stroke="#fde68a" stroke-width="3" fill="none" opacity="0.6"/>
  </g>

  <!-- Pencil (lying on book) -->
  <g transform="translate(370 305)">
    <rect x="0" y="0" width="80" height="8" fill="#facc15"/>
    <rect x="0" y="0" width="80" height="2" fill="#fde68a"/>
    <rect x="0" y="6" width="80" height="2" fill="#ca8a04"/>
    <!-- eraser -->
    <rect x="0" y="0" width="10" height="8" fill="#ec4899"/>
    <rect x="0" y="0" width="10" height="2" fill="#fbcfe8"/>
    <!-- metal band -->
    <rect x="10" y="0" width="6" height="8" fill="#cbd5e1"/>
    <rect x="10" y="0" width="6" height="2" fill="#e2e8f0"/>
    <!-- tip -->
    <polygon points="80,0 90,4 80,8" fill="#fde68a"/>
    <polygon points="86,2 90,4 86,6" fill="#1e293b"/>
  </g>

  <!-- Glasses (right of book) -->
  <g transform="translate(180 250)" opacity="0.85">
    <circle cx="0" cy="20" r="18" fill="none" stroke="#1e293b" stroke-width="2.5"/>
    <circle cx="50" cy="20" r="18" fill="none" stroke="#1e293b" stroke-width="2.5"/>
    <line x1="18" y1="20" x2="32" y2="20" stroke="#1e293b" stroke-width="2.5"/>
    <line x1="-18" y1="20" x2="-26" y2="18" stroke="#1e293b" stroke-width="2.5"/>
    <line x1="68" y1="20" x2="76" y2="18" stroke="#1e293b" stroke-width="2.5"/>
  </g>

  <!-- Floating words (decorative) -->
  <g opacity="0.5" font-family="serif" font-style="italic" font-weight="700">
    <text x="40" y="200" font-size="22" fill="#3b82f6" transform="rotate(-12 40 200)">bonjour</text>
    <text x="500" y="180" font-size="20" fill="#dc2626" transform="rotate(8 500 180)">merci</text>
    <text x="540" y="260" font-size="18" fill="#16a34a" transform="rotate(-6 540 260)">s'il vous plaît</text>
    <text x="20" y="140" font-size="18" fill="#a855f7" transform="rotate(10 20 140)">au revoir</text>
  </g>

  <!-- Sparkles -->
  <g fill="#fbbf24" opacity="0.7">
    <path d="M120 80 l2 -6 l2 6 l6 2 l-6 2 l-2 6 l-2 -6 l-6 -2 z"/>
    <path d="M540 50 l2 -6 l2 6 l6 2 l-6 2 l-2 6 l-2 -6 l-6 -2 z"/>
    <path d="M460 200 l1 -4 l1 4 l4 1 l-4 1 l-1 4 l-1 -4 l-4 -1 z"/>
  </g>
</svg>
